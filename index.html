<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      NOTE: Per-route <title>, meta description, canonical, OG, and Twitter
      tags are injected by react-helmet-async (see src/components/SEO.tsx)
      and baked into the static HTML during prerender (scripts/prerender.mjs).
      Do not duplicate them here — duplicate tags cause crawlers to pick the
      static fallback instead of the route-specific values.

      The fallback <title> below is only used if a route renders without
      mounting <SEO />, which should not happen in practice.
    -->
    <title>Spessirits Pilates — Physio-led Pilates in Schilde</title>
    <meta name="author" content="Spessirits Pilates" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <meta name="theme-color" content="#f5f0e8" />

    <!-- Static geo meta (location-based; same for every route) -->
    <meta name="geo.region" content="BE-VAN" />
    <meta name="geo.placename" content="Schilde" />
    <meta name="geo.position" content="51.2456;4.5147" />
    <meta name="ICBM" content="51.2456, 4.5147" />

    <!-- Static og:site_name (same for every route) -->
    <meta property="og:site_name" content="Spessirits Pilates" />
</head>

  <body>
    <noscript>
      <h1>Spessirits Pilates</h1>
      <p>Physio-led Pilates studio in Schilde, Belgium. Individual and duo sessions guided by licensed physiotherapist Cintia with over 20 years of experience.</p>
      <p>Address: Cirkellaan 12, 2970 Schilde, Belgium</p>
      <p>Phone: +32 472 24 05 81 | Email: spessiritskine@icloud.com</p>
      <p>Services: Individual Pilates sessions, Duo Pilates sessions, Physiotherapy-based movement coaching</p>
      <p>Languages: Nederlands, English, Français, Português</p>
      <nav>
        <a href="/">Home</a> |
        <a href="/over">Over Cintia</a> |
        <a href="/lessen">Lessen</a> |
        <a href="/prive">Privé Sessies</a> |
        <a href="/tarieven">Tarieven</a> |
        <a href="/boeken">Boeken</a> |
        <a href="/contact">Contact</a>
      </nav>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
